name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36 wheel

      - name: Clean previous builds
        run: |
          rm -rf .buildozer
          rm -rf bin
          rm -rf ~/.buildozer

      - name: Build APK with full log
        run: |
          # Guardar todo el log en un archivo
          yes | buildozer -v android debug 2>&1 | tee build_full.log

      - name: Upload full build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Full-Build-Log
          path: build_full.log
          retention-days: 1

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: BloqueadorSpam
          path: bin/*.apk
          retention-days: 1