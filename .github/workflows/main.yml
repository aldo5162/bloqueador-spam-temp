name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install buildozer
        run: |
          pip install buildozer cython==0.29.36 wheel

      - name: Build APK
        run: |
          yes | buildozer android debug

      - name: Upload APK to transfer.sh
        run: |
          APK_PATH=$(find bin -name "*.apk" | head -n 1)
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK generado: $APK_PATH"
            echo "📤 Subiendo a transfer.sh..."
            curl --upload-file "$APK_PATH" https://transfer.sh/bloqueador_spam.apk
            echo ""
            echo "🔗 Enlace de descarga válido por 14 días"
          else
            echo "❌ No se encontró el APK"
            exit 1
          fi