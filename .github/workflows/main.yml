name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev cmake libffi-dev libssl-dev
          pip3 install --user --upgrade buildozer cython virtualenv

      - name: Create Android license directory
        run: |
          mkdir -p ~/.android
          echo "### Licenses accepted" > ~/.android/repositories.cfg

      - name: Build APK
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Configurar para aceptar todas las licencias automáticamente
          export ANDROID_SDK_ROOT=~/.buildozer/android/platform/android-sdk
          echo y | buildozer android debug || true
          # Segundo intento después de que las licencias se hayan aceptado
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BloqueadorSpam-Debug
          path: bin/*.apk