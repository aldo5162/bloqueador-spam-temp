name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev cmake libffi-dev libssl-dev
          pip3 install --user --upgrade buildozer cython virtualenv

      - name: Create Android license directory
        run: |
          mkdir -p ~/.android
          echo "### Licenses accepted" > ~/.android/repositories.cfg

      - name: Clean previous builds
        run: |
          export PATH=$PATH:$HOME/.local/bin
          rm -rf ~/.buildozer
          rm -rf bin

      - name: Build APK with verbose logging
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Aumentar nivel de log a 2 para más detalles
          sed -i 's/log_level = .*/log_level = 2/' buildozer.spec
          # Ejecutar con timeout largo
          yes | buildozer -v android debug 2>&1 | tee build_log.txt

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Logs
          path: build_log.txt

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: BloqueadorSpam-Debug
          path: bin/*.apk