name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install buildozer
        run: |
          pip install buildozer cython==0.29.36 wheel

      - name: Build APK
        run: |
          yes | buildozer android debug

      - name: Upload APK to file.io
        run: |
          APK_PATH=$(find bin -name "*.apk" | head -n 1)
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK generado: $APK_PATH"
            echo "📤 Subiendo a file.io..."
            RESPONSE=$(curl -s -F "file=@$APK_PATH" https://file.io)
            LINK=$(echo $RESPONSE | grep -o '"link":"[^"]*"' | cut -d'"' -f4)
            if [ -n "$LINK" ]; then
              echo ""
              echo "🔗 ENLACE DE DESCARGA: $LINK"
              echo "⚠️  Válido por 1 descarga o 14 días"
            else
              echo "Error al subir: $RESPONSE"
              exit 1
            fi
          else
            echo "❌ No se encontró el APK"
            exit 1
          fi